<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог жиж</title>

<style>
:root {
  color-scheme: dark;
  --bg:#0c0f1a;
  --bg-card:#1b2034;
  --bg-card-strong:#232a44;
  --accent:#7c6cff;
  --text:#f5f7ff;
  --text-muted:#b6bdd9;
  --border:rgba(255,255,255,0.08);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid var(--border);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:40px;
border-radius:10px;
}

.header-links a{
color:white;
text-decoration:none;
margin-left:10px;
}

/* TITLE */

.page-title{
text-align:center;
padding:30px 10px;
}

.container{
max-width:1200px;
margin:auto;
padding:10px;
}

/* BRANDS */

.brands-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.brand-card{
background:var(--bg-card);
padding:15px;
border-radius:15px;
text-align:center;
cursor:pointer;
}

.brand-card img{
width:150px;
height:150px;
object-fit:cover;
border-radius:12px;
}

/* LIQUID */

.liquids-panel{
display:none;
}

.liquid-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-top:20px;
}

.liquid-card{
background:var(--bg-card-strong);
padding:12px;
border-radius:12px;
text-align:center;
}

.liquid-card img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}

.liquid-name{
font-weight:700;
margin-top:8px;
}

.liquid-desc{
font-size:0.85em;
color:var(--text-muted);
}

.liquid-price{
margin-top:6px;
font-weight:bold;
}

.soldout{
color:#777;
}

.back-button{
margin-top:10px;
padding:8px 16px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="images/shop-icon.jpg">
<span>fluffy</span>
</div>

<div class="header-links">
<a href="https://t.me/Fluffy_Manager" target="_blank">Telegram</a>
<a href="https://t.me/+jnN6mgE1BAUwNmIy" target="_blank">Отзывы</a>
</div>
</header>

<main>

<section class="page-title">
<h1>Каталог</h1>
<p>Выберите бренд</p>
</section>

<div class="container brands-grid" id="brandsContainer"></div>

<div class="container liquids-panel" id="liquidsContainer">
<button id="backBtn" class="back-button">Назад</button>
</div>

</main>

<script>

/* ===== DATA ===== */

const DATA = [

{
id:'vozol',
name:'Vozol Prime 5%',
price:15.99,
image:'images/vozol.jpg',
liquids:[
  {name:'Strawberry Kiwi',desc:'Клубника и киви',available:true},
  {name:'Strawberry Watermelon',desc:'Клубника и арбуз',available:true},
  {name:'Berry Ice',desc:'Лесные ягоды',available:true},
  {name:'Watermelon Bubblegum',desc:'Арбузная жвачка',available:true},
  {name:'Cherry Cola',desc:'Кола с вишней',available:true},
  {name:'Love 777',desc:'Фруктовый микс',available:true}
]
},

{
id:'elfliq',
name:'Elfliq 5%',
price:15.99,
image:'images/elfliq.jpg',
liquids:[
  {name:'Grape',desc:'Виноград',available:true},
  {name:'Raspberry Lychee',desc:'Малина и личи',available:true},
  {name:'Watermelon Cherry',desc:'Арбуз и вишня',available:true},
  {name:'Jasmine Raspberry',desc:'Малина и жасмин',available:true},
  {name:'Peach Ice',desc:'Персик',available:true},
  {name:'Cherry',desc:'Вишня',available:true}
]
},

{
id:'cuba',
name:'Cuba 66mg',
price:8.99,
image:'images/cuba.jpg',
liquids:[
  {name:'Forest Berries',desc:'Лесные ягоды',available:true},
  {name:'Grape',desc:'Виноград',available:true},
  {name:'Cherry',desc:'Вишня',available:true}
]
},

{
id:'baron',
name:'Baron 77mg',
price:9.99,
image:'images/baron.jpg',
liquids:[
  {name:'Wintergreen',desc:'Освежающая мята',available:true},
  {name:'Fruit Cocktail',desc:'Фруктовый микс',available:true},
  {name:'Classic',desc:'Классический вкус',available:true}
]
}

]

/* ===== ELEMENTS ===== */

const brandsContainer=document.getElementById('brandsContainer')
const liquidsContainer=document.getElementById('liquidsContainer')

/* ===== IMAGE AUTO ===== */

function getImage(brand,liquid){

let slug=liquid.name
.toLowerCase()
.replace(/\s+/g,'-')

let path=`images/${brand.id}-${slug}.webp`

return `<img src="${path}" onerror="this.src='${brand.image}'">`

}

  
function getImageOnline(brand, liquid){

let query = `${brand.name} ${liquid.name} vape`;

let searchURL = `https://duckduckgo.com/?q=${encodeURIComponent(query)}&iax=images&ia=images`;

return `
<a href="${searchURL}" target="_blank">
<img src="https://via.placeholder.com/200">
</a>
`

}

/* ===== SHOW BRANDS ===== */

function showBrands(){

brandsContainer.innerHTML=''

DATA.forEach(brand=>{

let card=document.createElement('div')
card.className='brand-card'

card.innerHTML=`
<img src="${brand.image}">
<div>${brand.name}</div>
`

card.onclick=()=>showLiquids(brand)

brandsContainer.appendChild(card)

})

brandsContainer.style.display='grid'
liquidsContainer.style.display='none'

}

/* ===== SHOW LIQUIDS ===== */

function showLiquids(brand){

liquidsContainer.innerHTML=`<button class="back-button" onclick="showBrands()">Назад</button>`

let list=document.createElement('div')
list.className='liquid-list'

brand.liquids.forEach(liquid=>{

let card=document.createElement('div')
card.className='liquid-card'

if(!liquid.available){

card.innerHTML=`
${getImageOnline(brand,liquid)}
<div class="liquid-name">${liquid.name}</div>
<div class="liquid-price soldout">Нет в наличии</div>
`

}else{

card.innerHTML=`
${getImage(brand,liquid)}
<div class="liquid-name">${liquid.name}</div>
<div class="liquid-desc">${liquid.desc}</div>
<div class="liquid-price">€${brand.price}</div>
`

}

list.appendChild(card)

})

liquidsContainer.appendChild(list)

brandsContainer.style.display='none'
liquidsContainer.style.display='block'

}

/* START */

showBrands()

</script>

</body>
</html>
